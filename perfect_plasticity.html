<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Perfect Plasticity σ–ε</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fcfcff;
      overflow: hidden;
      touch-action: none;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      max-width: 1200px;
      max-height: 1200px;
      margin: 0 auto;
      background: #fff;
      outline: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
<canvas id="canvas" width="600" height="600" tabindex="0" aria-label="Perfect plasticity sigma epsilon visualization"></canvas>

<script>
    "use strict";

    // ---------------------------
    // Window/UI parameters
    // ---------------------------
    const WIDTH = 600;
    const HEIGHT = 600;
    const FPS = 60;

    const BG = "rgb(252,252,255)";
    const FG = "rgb(0,0,0)";
    const ACCENT = "rgb(40,120,230)";
    const GRAY = "rgb(140,150,165)";
    const AXIS = "rgb(190,195,205)";
    const FRAME = "rgb(210,215,225)";
    const ROD_COLOR = "rgb(60,70,90)";

    // Plot area = whole canvas
    const PLOT = { left: 0, top: 0, width: WIDTH, height: HEIGHT };
    PLOT.right = PLOT.left + PLOT.width;
    PLOT.bottom = PLOT.top + PLOT.height;

    // Fixed ranges
    const E_RANGE = [-5, 5];
    const S_RANGE = [-40.0, 40.0];

    // Visualization geometry
    const L0_VIS_EPS = 1.0;
    const TRI_EPS = 0.12;
    const SPRING_EXT_PX = 100;
    const MIN_ROD_PX = 10;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.focus();

    // ---------------------------
    // Model: Slider -- Spring (series)
    // ---------------------------
    class ElastoplasticSeries {
      constructor(E = 20.0, g = 15.0) {
        this.E = Number(E);
        this.g = Number(g);
        this.resetState();
      }

      resetState() {
        this.epsPrev = 0.0;
        this.sigma = 0.0;
        this.epsP = 0.0;
      }

      setParams({ E = null, g = null } = {}) {
        if (E !== null) this.E = Math.max(1e-9, Number(E));
        if (g !== null) this.g = Math.max(1e-9, Number(g));
      }

      step(epsTotal) {
        const deps = epsTotal - this.epsPrev;
        const sigmaTrial = this.sigma + this.E * deps;

        if (Math.abs(sigmaTrial) <= this.g + 1e-12) {
          this.sigma = sigmaTrial;
        } else {
          const sign = sigmaTrial >= 0.0 ? 1.0 : -1.0;
          let dgamma = (Math.abs(sigmaTrial) - this.g) / this.E;
          if (dgamma < 0.0) dgamma = 0.0;
          this.epsP += sign * dgamma;
          this.sigma = this.g * sign;
        }

        this.epsPrev = epsTotal;
        return this.sigma;
      }
    }

    // ---------------------------
    // Drawing helpers
    // ---------------------------
    function drawText(text, x, y, size = 18, color = FG) {
      ctx.save();
      ctx.font = `${size}px Arial, "Hiragino Sans", "Yu Gothic", sans-serif`;
      ctx.fillStyle = color;
      ctx.textBaseline = "top";
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawLine(x0, y0, x1, y1, color, width = 1) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
      ctx.restore();
    }

    function drawSpring(p0, p1, nCoils = 9, amp = 8, color = GRAY, width = 2) {
      const [x0, y0] = p0;
      const [x1, y1] = p1;
      const dx = x1 - x0;
      const dy = y1 - y0;
      const L = Math.hypot(dx, dy);
      if (L < 1e-6) return;

      const ux = dx / L;
      const uy = dy / L;
      const nx = -uy;
      const ny = ux;
      const pts = [];
      const head = 14;
      const tail = 14;
      const body = Math.max(0.0, L - head - tail);

      pts.push([x0, y0]);
      pts.push([x0 + ux * head, y0 + uy * head]);

      if (body > 1) {
        const step = body / (nCoils * 2);
        let cur = head;
        let sgn = 1;
        for (let i = 0; i < nCoils * 2; i++) {
          cur += step;
          const px = x0 + ux * cur + nx * (amp * sgn);
          const py = y0 + uy * cur + ny * (amp * sgn);
          pts.push([px, py]);
          sgn *= -1;
        }
      }

      pts.push([x1 - ux * tail, y1 - uy * tail]);
      pts.push([x1, y1]);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
      ctx.restore();
    }

    function drawSliderTriangle(apexX, y, epsWidthPx, height = 26, color = "rgb(230,230,245)") {
      const w = Math.max(8, Math.floor(epsWidthPx));
      const h = Math.floor(height);
      const pts = [
        [apexX, y],
        [apexX + w, y - h / 2],
        [apexX + w, y + h / 2]
      ];

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      ctx.lineTo(pts[1][0], pts[1][1]);
      ctx.lineTo(pts[2][0], pts[2][1]);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = "rgb(60,60,80)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    function clamp(value, minValue, maxValue) {
      return Math.max(minValue, Math.min(maxValue, value));
    }

    // ---------------------------
    // App state
    // ---------------------------
    const app = {
      model: new ElastoplasticSeries(),
      epsAnchor0: -3.0,
      pxPerEps: PLOT.width / (E_RANGE[1] - E_RANGE[0]),
      xr: null,
      dragging: false,
      relax: false,
      relaxTau: 0.18,
      hist: [],
      maxHist: 40000,
      x0: null,
      y0: null,
      running: true,
      lastTime: performance.now(),

      epsFromX(x) {
        return (x - this.x0) / this.pxPerEps;
      },

      xFromEps(eps) {
        return this.x0 + eps * this.pxPerEps;
      },

      pushHist(eAbs, sigma) {
        this.hist.push([eAbs, sigma]);
        if (this.hist.length > this.maxHist) this.hist.shift();
      },

      initStateConsistentWithGeometry() {
        const epsAbs = this.epsFromX(this.xr);
        this.model.epsP = 0.0;
        this.model.sigma = 0.0;
        this.model.epsPrev = epsAbs;
        this.hist = [];
        this.pushHist(epsAbs, 0.0);
      },

      resetAll() {
        const E = this.model.E;
        const g = this.model.g;
        this.model = new ElastoplasticSeries(E, g);
        if (this.x0 !== null) {
          this.xr = this.xFromEps(0.0);
          this.initStateConsistentWithGeometry();
        } else {
          this.xr = null;
          this.hist = [];
          this.pushHist(0.0, 0.0);
        }
        this.dragging = false;
        this.relax = false;
      },

      clearHistory() {
        if (this.xr === null) return;
        const epsAbsNow = this.epsFromX(this.xr);
        this.hist = [];
        this.pushHist(epsAbsNow, this.model.sigma);
      },

      saveCsv() {
        const rows = [];
        rows.push(["meta", "eps_anchor0", this.epsAnchor0.toFixed(6)]);
        rows.push(["meta", "E", this.model.E.toFixed(6)]);
        rows.push(["meta", "g", this.model.g.toFixed(6)]);
        rows.push(["eps_abs", "sigma"]);
        for (const [e, s] of this.hist) rows.push([e, s]);

        const csv = rows.map(row => row.join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "ss_history.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      },

      toXY(e, s) {
        const eMin = E_RANGE[0];
        const eMax = E_RANGE[1];
        const sMin = S_RANGE[0];
        const sMax = S_RANGE[1];
        const x = PLOT.left + ((e - eMin) / (eMax - eMin)) * PLOT.width;
        const y = PLOT.bottom - ((s - sMin) / (sMax - sMin)) * PLOT.height;
        return [x, y];
      },

      updateModel(dt) {
        if (this.xr === null) return;

        const epsAbs = this.epsFromX(this.xr);
        const sigma = this.model.step(epsAbs);

        if (this.relax && !this.dragging) {
          let targetX = this.xFromEps(this.model.epsP);
          targetX = clamp(targetX, PLOT.left + 8, PLOT.right - 8);
          const alpha = 1.0 - Math.exp(-dt / Math.max(1e-6, this.relaxTau));
          this.xr = this.xr + alpha * (targetX - this.xr);
          if (Math.abs(this.xr - targetX) < 0.3) {
            this.xr = targetX;
            this.relax = false;
          }
        }

        const last = this.hist[this.hist.length - 1];
        if (!last || Math.abs(epsAbs - last[0]) > 1e-9 || Math.abs(sigma - last[1]) > 1e-9) {
          this.pushHist(epsAbs, sigma);
        }
      },

      drawPlotAndModel() {
        ctx.save();
        ctx.fillStyle = "rgb(255,255,255)";
        ctx.fillRect(PLOT.left, PLOT.top, PLOT.width, PLOT.height);
        ctx.strokeStyle = FRAME;
        ctx.lineWidth = 1;
        ctx.strokeRect(PLOT.left, PLOT.top, PLOT.width, PLOT.height);
        ctx.restore();

        const x0Axis = this.toXY(0, S_RANGE[0])[0];
        const y0Axis = this.toXY(E_RANGE[0], 0)[1];

        drawLine(x0Axis, PLOT.top, x0Axis, PLOT.bottom, AXIS, 2);
        drawLine(PLOT.left, y0Axis, PLOT.right, y0Axis, AXIS, 2);

        let p1 = this.toXY(-3.0, -1.0);
        let p2 = this.toXY(-3.0, 1.0);
        drawLine(p1[0], p1[1], p2[0], p2[1], AXIS, 2);

        const g = this.model.g;
        p1 = this.toXY(-6.0, g);
        p2 = this.toXY(6.0, g);
        drawLine(p1[0], p1[1], p2[0], p2[1], "rgb(255,0,0)", 2);
        p1 = this.toXY(-6.0, -g);
        p2 = this.toXY(6.0, -g);
        drawLine(p1[0], p1[1], p2[0], p2[1], "rgb(255,0,0)", 2);

        this.x0 = x0Axis;
        this.y0 = y0Axis;

        if (this.xr === null) {
          this.xr = this.xFromEps(0.0);
          this.initStateConsistentWithGeometry();
        }

        if (this.hist.length >= 2) {
          ctx.save();
          ctx.beginPath();
          const first = this.toXY(this.hist[0][0], this.hist[0][1]);
          ctx.moveTo(first[0], first[1]);
          for (let i = 1; i < this.hist.length; i++) {
            const pt = this.toXY(this.hist[i][0], this.hist[i][1]);
            ctx.lineTo(pt[0], pt[1]);
          }
          ctx.strokeStyle = ACCENT;
          ctx.lineWidth = 3;
          ctx.stroke();

          const last = this.toXY(this.hist[this.hist.length - 1][0], this.hist[this.hist.length - 1][1]);
          ctx.beginPath();
          ctx.arc(last[0], last[1], 6, 0, Math.PI * 2);
          ctx.fillStyle = ACCENT;
          ctx.fill();
          ctx.restore();
        }

        const yMech = this.y0;
        const epsAnchorDraw = this.epsAnchor0 + this.model.epsP;
        const xAnchor = this.xFromEps(epsAnchorDraw);

        const triWPx = TRI_EPS * this.pxPerEps;
        drawSliderTriangle(xAnchor, yMech, triWPx, 26, "rgb(235,235,245)");

        const xCoilL = xAnchor + triWPx + 4;
        const epsE = this.model.sigma / Math.max(1e-6, this.model.E);
        const coilLenEps = Math.max(0.10, L0_VIS_EPS + epsE);
        const coilPxNominal = coilLenEps * this.pxPerEps;

        const xEps = clamp(this.xr, PLOT.left + 8, PLOT.right - 8);
        const gapPx = Math.max(0.0, xEps - xCoilL);

        let desiredCoilPx = Math.min(coilPxNominal + SPRING_EXT_PX, Math.max(0.0, gapPx - MIN_ROD_PX));
        if (desiredCoilPx < 12) {
          desiredCoilPx = Math.min(coilPxNominal, Math.max(0.0, gapPx - MIN_ROD_PX));
        }

        const xCoilR = xCoilL + desiredCoilPx;
        drawSpring([xCoilL, yMech], [xCoilR, yMech], 9, 8, GRAY, 2);
        drawLine(xCoilR, yMech, xEps, yMech, ROD_COLOR, 3);

        ctx.save();
        ctx.beginPath();
        ctx.arc(xEps, yMech, 9, 0, Math.PI * 2);
        ctx.fillStyle = ACCENT;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(xEps, yMech, 10, 0, Math.PI * 2);
        ctx.strokeStyle = "rgb(40,50,70)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      },

      drawInfo() {
        if (this.x0 === null || this.xr === null) return;
        const epsAbs = this.epsFromX(this.xr);
        drawText(`l=${this.model.E.toPrecision(3)} g=${this.model.g.toPrecision(3)}`, PLOT.left + 10, 10, 22, FG);
        drawText(`ε=${epsAbs >= 0 ? "+" : ""}${epsAbs.toFixed(3)} σ=${this.model.sigma >= 0 ? "+" : ""}${this.model.sigma.toFixed(3)}`, PLOT.left + 10, 40, 22, FG);
        drawText("Q/A:E ±  W/S:g ±  R:reset  C:clear  P:CSV", this.x0 + 5, PLOT.bottom - 20, 12, FG);
      },

      draw() {
        ctx.save();
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.restore();
        this.drawPlotAndModel();
        this.drawInfo();
      },

      loop(now) {
        const minFrame = 1000 / FPS;
        const elapsedMs = now - this.lastTime;
        if (elapsedMs >= minFrame) {
          const dt = Math.min(0.05, elapsedMs / 1000.0);
          this.lastTime = now;
          if (this.running) this.updateModel(dt);
          this.draw();
        }
        requestAnimationFrame(this.loop.bind(this));
      }
    };

    app.pushHist(0.0, 0.0);

    // ---------------------------
    // Events
    // ---------------------------
    function pointerToCanvas(ev) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (ev.clientX - rect.left) * (WIDTH / rect.width),
        y: (ev.clientY - rect.top) * (HEIGHT / rect.height)
      };
    }

    canvas.addEventListener("pointerdown", ev => {
      const p = pointerToCanvas(ev);
      if (app.x0 === null || app.y0 === null) return;
      const insidePlot = p.x >= PLOT.left && p.x <= PLOT.right && p.y >= PLOT.top && p.y <= PLOT.bottom;
      if (!insidePlot) return;

      const handleX = app.xr ?? app.x0;
      if (Math.abs(p.x - handleX) <= 18 && Math.abs(p.y - app.y0) <= 22) {
        app.dragging = true;
        app.relax = false;
        canvas.setPointerCapture(ev.pointerId);
        ev.preventDefault();
      }
    });

    canvas.addEventListener("pointermove", ev => {
      if (!app.dragging) return;
      const p = pointerToCanvas(ev);
      app.xr = clamp(p.x, PLOT.left + 8, PLOT.right - 8);
      ev.preventDefault();
    });

    function endDrag(ev) {
      if (!app.dragging) return;
      app.dragging = false;
      app.relax = true;
      try {
        canvas.releasePointerCapture(ev.pointerId);
      } catch (_) {
        // already released
      }
      ev.preventDefault();
    }

    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);

    window.addEventListener("keydown", ev => {
      const key = ev.key.toLowerCase();
      if (key === "r") {
        app.resetAll();
      } else if (key === "c") {
        app.clearHistory();
      } else if (key === "p") {
        app.saveCsv();
      } else if (key === "q") {
        app.model.setParams({ E: app.model.E * 1.1 });
      } else if (key === "a") {
        app.model.setParams({ E: app.model.E / 1.1 });
      } else if (key === "w") {
        app.model.setParams({ g: app.model.g * 1.1 });
      } else if (key === "s") {
        app.model.setParams({ g: app.model.g / 1.1 });
      } else if (key === " ") {
        app.running = !app.running;
      } else {
        return;
      }
      ev.preventDefault();
    });

    requestAnimationFrame(app.loop.bind(app));
  </script>
</body>
</html>
